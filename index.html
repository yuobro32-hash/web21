<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Web Saya</title>
    <style>
        /* CSS Sederhana agar tampilan menarik */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background: #333;
            color: #fff;
            padding: 1rem;
            text-align: center;
        }
        nav {
            background: #444;
            color: #fff;
            padding: 0.5rem;
            text-align: center;
        }
        nav a {
            color: #fff;
            margin: 0 15px;
            text-decoration: none;
        }
        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
            padding: 20px;
            background: #fff;
            margin-top: 20px;
            border-radius: 8px;
        }
        footer {
            text-align: center;
            padding: 20px;
            margin-top: 20px;
            color: #666;
        }
    </style>
</head>
<body>

    <header>
        <h1>Selamat Datang di Website yukixpuki</h1>
    </header>

    <nav>
        <a href="#">Beranda</a>
        <a href="#">Tentang</a>
        <a href="#">Kontak</a>
    </nav>

    <div class="container">
        <h2>Halo, Dunia!</h2>
        <p>Ini adalah halaman web pertama saya yang dibuat menggunakan HTML5 dan sedikit sentuhan CSS.</p>
        <p>Kamu bisa mengubah teks ini, menambahkan gambar, atau membuat formulir sesuai keinginanmu.</p>
        
        <button onclick="sapa()">Klik ini keluar</button>
    </div>

    <footer>
        <p>&copy; 2026 Hak Cipta Terpelihara</p>
    </footer>

    <script>
        // JavaScript sederhana untuk interaksi
        function sapa() {
            alert('halo, makasih ya sudah berkunjung.');
        }
    </script>

</body>
</html>
